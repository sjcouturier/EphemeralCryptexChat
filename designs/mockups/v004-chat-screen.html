<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EphemeralCryptexChat v004 — Chat Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', monospace;
            background: linear-gradient(135deg, #0a0015 0%, #001a2e 50%, #0a0015 100%);
            background-attachment: fixed;
            color: #00f6ff;
            overflow: hidden;
        }

        /* Animated grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(0, 246, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 246, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: drift 8s linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00f6ff;
            border-radius: 50%;
            opacity: 0;
            animation: float-up 6s linear infinite;
        }

        @keyframes float-up {
            0% {
                opacity: 0.5;
                transform: translateY(0) translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(50px);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: relative;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 2px solid #00f6ff;
            background: rgba(0, 20, 40, 0.9);
            backdrop-filter: blur(8px);
            box-shadow: 
                0 0 40px rgba(0, 246, 255, 0.6),
                0 0 80px rgba(0, 246, 255, 0.3),
                inset 0 0 20px rgba(0, 246, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .header::before,
        .header::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #00f6ff;
            background: transparent;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.8);
        }

        .header::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .header::after {
            top: -5px;
            right: -5px;
            border-left: none;
            border-bottom: none;
        }

        .header .corner-br {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #00f6ff;
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.8);
        }

        .header .corner-bl {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #00f6ff;
            bottom: -5px;
            left: -5px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.8);
        }

        .header-back {
            font-size: 24px;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #00f6ff) drop-shadow(0 0 16px #00f6ff) drop-shadow(0 0 24px rgba(0, 246, 255, 0.6));
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
            background: linear-gradient(90deg, #00f6ff, #ff00c8, #00f6ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header-menu {
            font-size: 20px;
            cursor: pointer;
            color: #ff006e;
            filter: drop-shadow(0 0 8px #ff006e) drop-shadow(0 0 16px #ff006e) drop-shadow(0 0 24px rgba(255, 0, 110, 0.6));
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 8px;
            padding-bottom: 20px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(0, 246, 255, 0.05);
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 246, 255, 0.3);
            border-radius: 3px;
        }

        /* Message bubble */
        .message-bubble {
            position: relative;
            padding: 16px;
            border: 2px solid;
            background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: visible;
            max-width: 95%;
        }

        /* Corner brackets */
        .message-bubble::before,
        .message-bubble::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid inherit;
            pointer-events: none;
            box-shadow: 0 0 12px currentColor;
        }

        .message-bubble::before {
            top: -4px;
            left: -4px;
            border-right: none;
            border-bottom: none;
        }

        .message-bubble::after {
            top: -4px;
            right: -4px;
            border-left: none;
            border-bottom: none;
        }

        .message-bubble .corner-br {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid inherit;
            bottom: -4px;
            right: -4px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 12px currentColor;
        }

        .message-bubble .corner-bl {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid inherit;
            bottom: -4px;
            left: -4px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 12px currentColor;
        }

        /* Incoming message (cyan) */
        .message-bubble.incoming {
            border-color: #00f6ff;
            box-shadow: 
                0 0 30px rgba(0, 246, 255, 0.5),
                0 0 60px rgba(0, 246, 255, 0.2),
                inset 0 0 15px rgba(0, 246, 255, 0.15);
            align-self: flex-start;
        }

        .message-bubble.incoming:hover {
            box-shadow: 
                0 0 40px rgba(0, 246, 255, 0.7),
                0 0 80px rgba(0, 246, 255, 0.3),
                inset 0 0 20px rgba(0, 246, 255, 0.2);
        }

        /* Outgoing message (magenta) */
        .message-bubble.outgoing {
            border-color: #ff00c8;
            box-shadow: 
                0 0 30px rgba(255, 0, 200, 0.5),
                0 0 60px rgba(255, 0, 200, 0.2),
                inset 0 0 15px rgba(255, 0, 200, 0.15);
            align-self: flex-end;
        }

        .message-bubble.outgoing:hover {
            box-shadow: 
                0 0 40px rgba(255, 0, 200, 0.7),
                0 0 80px rgba(255, 0, 200, 0.3),
                inset 0 0 20px rgba(255, 0, 200, 0.2);
        }

        .message-sender {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .message-incoming .message-sender {
            color: #00f6ff;
        }

        .message-outgoing .message-sender {
            color: #ff00c8;
        }

        .message-status {
            font-size: 12px;
            opacity: 0.7;
            font-style: italic;
        }

        .message-incoming .message-status {
            color: #00f6ff;
        }

        .message-outgoing .message-status {
            color: #ff00c8;
        }

        /* Encrypted text */
        .message-encrypted {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        /* Decrypted text */
        .message-text {
            font-size: 14px;
            color: #fff;
            line-height: 1.5;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 8px;
            text-align: right;
        }

        .message-incoming .message-time {
            color: #00f6ff;
        }

        .message-outgoing .message-time {
            color: #ff00c8;
        }

        /* Input area */
        .input-area {
            position: relative;
            padding: 14px;
            border: 2px solid #00f6ff;
            background: rgba(0, 20, 40, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 
                0 0 40px rgba(0, 246, 255, 0.6),
                0 0 80px rgba(0, 246, 255, 0.3),
                inset 0 0 20px rgba(0, 246, 255, 0.2);
        }

        .input-area::before,
        .input-area::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid #00f6ff;
            box-shadow: 0 0 12px rgba(0, 246, 255, 0.8);
        }

        .input-area::before {
            top: -4px;
            left: -4px;
            border-right: none;
            border-bottom: none;
        }

        .input-area::after {
            top: -4px;
            right: -4px;
            border-left: none;
            border-bottom: none;
        }

        .input-area .corner-br {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid #00f6ff;
            bottom: -4px;
            right: -4px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 246, 255, 0.8);
        }

        .input-area .corner-bl {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid #00f6ff;
            bottom: -4px;
            left: -4px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 246, 255, 0.8);
        }

        .input-placeholder {
            flex: 1;
            color: rgba(0, 246, 255, 0.5);
            font-size: 14px;
        }

        .input-action {
            font-size: 20px;
            cursor: pointer;
            filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 12px currentColor) drop-shadow(0 0 18px currentColor);
            text-shadow: 0 0 8px currentColor;
            transition: all 0.2s ease;
        }

        .input-action.send {
            color: #00f6ff;
        }

        .input-action.send:hover {
            filter: drop-shadow(0 0 12px #00f6ff) drop-shadow(0 0 24px #00f6ff) drop-shadow(0 0 32px rgba(0, 246, 255, 0.8));
        }

        .input-action.mute {
            color: #ff006e;
        }

        .input-action.mute:hover {
            filter: drop-shadow(0 0 12px #ff006e) drop-shadow(0 0 24px #ff006e) drop-shadow(0 0 32px rgba(255, 0, 110, 0.8));
        }

        .input-action.add {
            color: #d4af37;
        }

        .input-action.add:hover {
            filter: drop-shadow(0 0 12px #d4af37) drop-shadow(0 0 24px #d4af37) drop-shadow(0 0 32px rgba(212, 175, 55, 0.8));
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-back">←</div>
            <div class="header-title">CRYPTEX CHAT</div>
            <div class="header-menu">⋯</div>
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
        </div>

        <!-- Messages -->
        <div class="messages">
            <!-- Incoming message 1 -->
            <div class="message-bubble incoming message-incoming">
                <div class="message-sender">Ava Keller</div>
                <div class="message-encrypted">R@lb*UzHbgV¹¹Δ¹</div>
                <div class="message-text">Meet me at the usual place.</div>
                <div class="message-time">10:24 PM</div>
                <div class="corner-br"></div>
                <div class="corner-bl"></div>
            </div>

            <!-- Outgoing message 1 -->
            <div class="message-bubble outgoing message-outgoing">
                <div class="message-sender">You</div>
                <div class="message-encrypted">%7#LGp²eSjn9$&.</div>
                <div class="message-text">Got it. See you there.</div>
                <div class="message-time">10:25 PM</div>
                <div class="corner-br"></div>
                <div class="corner-bl"></div>
            </div>

            <!-- Status message -->
            <div class="message-bubble incoming message-incoming">
                <div class="message-sender">Scott (You)</div>
                <div class="message-status">Secure channel open.</div>
                <div class="corner-br"></div>
                <div class="corner-bl"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-placeholder">Enter message...</div>
            <div class="input-action send">✈️</div>
            <div class="input-action mute">🔇</div>
            <div class="input-action add">➕</div>
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
        </div>
    </div>

    <script>
        // Generate floating particles
        function generateParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        generateParticles();
    </script>
</body>
</html>
