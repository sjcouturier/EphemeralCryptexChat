<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EphemeralCryptexChat v006 — Green Terminal Aesthetic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background: #0a0a0a;
            color: #00ff00;
            overflow: hidden;
        }

        /* Animated scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 500;
            animation: scanline-drift 8s linear infinite;
        }

        @keyframes scanline-drift {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main terminal frame */
        .terminal-frame {
            position: relative;
            border: 3px solid #00ff00;
            background: #000000;
            box-shadow: 
                0 0 40px rgba(0, 255, 0, 0.4),
                inset 0 0 40px rgba(0, 255, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Corner brackets on terminal */
        .terminal-frame::before,
        .terminal-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        .terminal-frame::before {
            top: -6px;
            left: -6px;
            border-right: none;
            border-bottom: none;
        }

        .terminal-frame::after {
            top: -6px;
            right: -6px;
            border-left: none;
            border-bottom: none;
        }

        .frame-corner-br {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00ff00;
            bottom: -6px;
            right: -6px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        .frame-corner-bl {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00ff00;
            bottom: -6px;
            left: -6px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        /* Header/title bar */
        .terminal-header {
            position: relative;
            padding: 14px 20px;
            border-bottom: 2px solid #00ff00;
            background: rgba(0, 255, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        .header-icon {
            font-size: 16px;
            filter: drop-shadow(0 0 8px #00ff00);
        }

        .header-menu {
            font-size: 16px;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #00ff00);
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: #000000;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.05);
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.3);
            border-radius: 2px;
        }

        /* Message block */
        .message-block {
            position: relative;
            border: 2px solid #00ff00;
            background: #000000;
            padding: 16px;
            overflow: visible;
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 15px rgba(0, 255, 0, 0.08);
        }

        .message-block::before,
        .message-block::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .message-block::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .message-block::after {
            top: -5px;
            right: -5px;
            border-left: none;
            border-bottom: none;
        }

        .block-corner-br {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .block-corner-bl {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            bottom: -5px;
            left: -5px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .message-ciphertext {
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            font-weight: 400;
            color: rgba(0, 255, 0, 0.6);
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.3);
            line-height: 1.6;
        }

        .message-plaintext {
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            font-weight: 400;
            color: #00ff00;
            line-height: 1.8;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
            letter-spacing: 0.5px;
        }

        /* Typing cursor effect */
        .message-plaintext::after {
            content: '_';
            animation: blink 1s step-start infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Input area */
        .input-area {
            position: relative;
            margin-top: auto;
            padding: 14px 20px;
            border: 2px solid #00ff00;
            background: #000000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 
                0 0 30px rgba(0, 255, 0, 0.4),
                inset 0 0 15px rgba(0, 255, 0, 0.1);
            overflow: visible;
        }

        .input-area::before,
        .input-area::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .input-area::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .input-area::after {
            top: -5px;
            right: -5px;
            border-left: none;
            border-bottom: none;
        }

        .input-corner-br {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .input-corner-bl {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            bottom: -5px;
            left: -5px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        .input-prompt {
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
            letter-spacing: 0.5px;
        }

        .input-placeholder {
            flex: 1;
            color: rgba(0, 255, 0, 0.5);
            font-size: 13px;
            font-family: 'Courier Prime', monospace;
        }

        .input-action {
            font-size: 18px;
            cursor: pointer;
            filter: drop-shadow(0 0 6px #00ff00) drop-shadow(0 0 12px #00ff00);
            transition: all 0.2s ease;
        }

        .input-action:hover {
            filter: drop-shadow(0 0 10px #00ff00) drop-shadow(0 0 20px #00ff00);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="container">
        <div class="terminal-frame">
            <!-- Header -->
            <div class="terminal-header">
                <div class="header-title">
                    <div class="header-icon">🔒</div>
                    <span>SECURE TERMINAL v3.7</span>
                </div>
                <div class="header-menu">⋮</div>
            </div>

            <!-- Messages -->
            <div class="messages">
                <!-- Message 1 -->
                <div class="message-block">
                    <div class="message-ciphertext">R@ld*"UzHbigV*1^</div>
                    <div class="message-plaintext">Meet me at the usual place.</div>
                    <div class="block-corner-br"></div>
                    <div class="block-corner-bl"></div>
                </div>

                <!-- Message 2 -->
                <div class="message-block">
                    <div class="message-ciphertext">%7#1Gp*eS!ng9$&</div>
                    <div class="message-plaintext">Got it. See you there.</div>
                    <div class="block-corner-br"></div>
                    <div class="block-corner-bl"></div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <div class="input-prompt">Enter Message:</div>
                <div class="input-placeholder">_</div>
                <div class="input-action">📨</div>
                <div class="input-action">🎙️</div>
                <div class="input-action">➕</div>
                <div class="input-corner-br"></div>
                <div class="input-corner-bl"></div>
            </div>

            <!-- Frame corners -->
            <div class="frame-corner-br"></div>
            <div class="frame-corner-bl"></div>
        </div>
    </div>
</body>
</html>
